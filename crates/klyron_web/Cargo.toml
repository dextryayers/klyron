[package]
name = "klyron_web"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
reqwest = { workspace = true, features = ["rustls-tls"] }
url = "2"
urlencoding = "2"
futures-util = "0.3"
tokio = { version = "1", features = ["time"] }
tokio-stream = "0.1"
bytes = "1"
