[package]
name = "klyron_runtime"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
klyron-core = { path = "../../src/core" }
deno_core.workspace = true
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full", "time", "sync"] }
once_cell = "1"
tracing = "0.1"
parking_lot = "0.12"
