[package]
name = "klyron_test"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
quick-xml = "0.37"
rayon = "1"
sha2 = "0.10"
glob = "0.3"
proptest = { version = "1", optional = true }

[features]
default = []
property-tests = ["dep:proptest"]
