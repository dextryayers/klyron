[variables]
name = { type = "string", prompt = "Project name", default = "my-symfony-app" }
description = { type = "string", prompt = "Project description", default = "A Symfony API application" }
author = { type = "string", prompt = "Author name", default = "Klyron" }
version = { type = "string", prompt = "Symfony version", default = "7.1" }
php_version = { type = "string", prompt = "PHP version", default = "^8.2" }
