[package]
name = "{{ name }}"
version = "{{ version }}"
description = "{{ description }}"
edition = "2021"

[dependencies]
axum = "0.7"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sea-orm = { version = "1", features = ["sqlx-postgres", "runtime-tokio"] }
tower-http = { version = "0.5", features = ["cors"] }
dotenv = "0.15"
