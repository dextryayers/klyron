[package]
name = "{{ name }}"
version = "{{ version }}"
description = "{{ description }}"
edition = "2021"

[dependencies]
leptos = { version = "0.7", features = ["csr", "ssr"] }
leptos_router = { version = "0.7", optional = true }
console_log = "1"
log = "0.4"
tokio = { version = "1", features = ["full"] }

[features]
default = ["csr"]
csr = ["leptos/csr"]
ssr = ["leptos/ssr", "leptos_router"]
hydrate = ["leptos/hydrate", "leptos_router"]
