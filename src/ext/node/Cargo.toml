[package]
name = "klyron-ext-node"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
deno_core.workspace = true
deno_error.workspace = true
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
tokio = { version = "1", features = ["full"] }
tokio-rustls = "0.26"
rustls = "0.23"
rustls-pemfile = "2"
webpki-roots = "0.26"
flate2 = "1"

[dev-dependencies]
klyron-ext-net = { path = "../net" }
klyron-ext-fs = { path = "../fs" }
klyron-ext-crypto = { path = "../crypto" }
tokio = { version = "1", features = ["full"] }
