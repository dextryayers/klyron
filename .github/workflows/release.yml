name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustc, cargo, clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace
      - run: cargo test --workspace
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo fmt --check

  build:
    name: Build ${{ matrix.target }}
    needs: [test]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            arch: x86_64
            os_name: linux
            archive_ext: .tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            arch: aarch64
            os_name: linux
            archive_ext: .tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            arch: x86_64
            os_name: macos
            archive_ext: .tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            arch: aarch64
            os_name: macos
            archive_ext: .tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            arch: x86_64
            os_name: windows
            archive_ext: .zip

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross
        if: matrix.cross
        run: cargo install cross
      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} --features all-engines
      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }} --features all-engines
      - name: Prepare archive
        shell: bash
        run: |
          BIN="klyron"
          SRC="target/${{ matrix.target }}/release/${BIN}"
          if [ "${{ matrix.os_name }}" = "windows" ]; then
            SRC="${SRC}.exe"
          fi
          mkdir -p dist
          ARCHIVE_NAME="klyron-${{ matrix.os_name }}-${{ matrix.arch }}${{ matrix.archive_ext }}"
          if [ "${{ matrix.os_name }}" = "windows" ]; then
            7z a "dist/${ARCHIVE_NAME}" "$SRC"
          else
            tar czf "dist/${ARCHIVE_NAME}" -C "$(dirname "$SRC")" "$BIN"
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: klyron-${{ matrix.os_name }}-${{ matrix.arch }}
          path: dist/*

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # for npm provenance
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
      - name: Generate SHA256SUMS
        run: |
          cd dist
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec sha256sum {} \; | tee SHA256SUMS
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: Klyron ${{ github.ref_name }}
          body: |
            ## Klyron ${{ github.ref_name }}

            ### Installation
            ```bash
            npm install -g klyron
            ```

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
            ```

            ```powershell
            iwr -useb https://raw.githubusercontent.com/${{ github.repository }}/main/install.ps1 | iex
            ```

            ### What's Changed
            ${{ github.event.head_commit.message }}

            ### Assets
            See below for platform-specific binaries.
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
            dist/**/SHA256SUMS
          draft: true
          prerelease: false
          generate_release_notes: true

  publish-npm:
    name: Publish to npm
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # for npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Update npm package version
        run: |
          cd npm
          npm version "${{ steps.version.outputs.tag }}" --no-git-tag-version
      - name: Publish to npm
        working-directory: npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
