name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - run: cargo check --workspace

  test:
    name: cargo test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - run: cargo test --workspace --no-fail-fast

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy
      - run: cargo clippy --workspace -- -D warnings

  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all --check

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories

  engine-tests:
    name: Engine tests
    runs-on: ubuntu-latest
    needs: check
    strategy:
      matrix:
        engine: [boa, quickjs]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - run: cargo test -p klyron-engine-${{ matrix.engine }}

  windows:
    name: cargo check (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      # Windows build — skip native engine features (V8/JSC need Linux system deps)
      # and skip proc-based tests that are Linux-specific.
      - name: Check workspace
        shell: bash
        run: cargo check --workspace
      - name: Test compatible crates
        shell: bash
        run: |
          cargo test -p klyron-engine-common --no-fail-fast
          cargo test -p klyron_engine --no-fail-fast
          cargo test -p klyron_fs --no-fail-fast
