[package]
name = "klyron-engine-jsc"
version = "1.1.0"
edition = "2024"

[features]
default = []
native = []

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
rand = "0.8"
base64 = "0.22"
hex = "0.4"
url = "2"
klyron-engine-common = { path = "../common" }

[build-dependencies]
cc = "1"
pkg-config = "0.3"
