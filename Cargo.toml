    "src/ext/console",
    "src/ext/timers",
    "src/ext/web",
    "src/ext/crypto",
    "src/ext/fs",
    "src/ext/net",
    "src/ext/http",
    "src/ext/node",
    "src/ext/klyron",
    "crates/klyron_cli",
    "crates/klyron_compat",
    "crates/klyron_config",
    "crates/klyron_engine",
    "crates/klyron_fs",
    "crates/klyron_loader",
    "crates/klyron_logger",
    "crates/klyron_node",
    "crates/klyron_runtime",
    "crates/klyron_debugger",
    "crates/klyron_utils",
    "crates/klyron_lsp",
]
members = [
    "src/cli",
    "src/core",
    "src/ext/console",
    "src/ext/timers",
    "src/ext/web",
    "src/ext/crypto",
    "src/ext/fs",
