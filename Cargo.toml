    "src/ext/http",
    "src/ext/node",
    "src/ext/klyron",
    "src/ext/ffi",
    "src/ext/ws",
    "src/ext/html",
    "src/ext/process",
    "crates/klyron_adapter",
    "crates/klyron_ai",
    "crates/klyron_bench",
    "crates/klyron_bundler",
    "crates/klyron_cache",
    "crates/klyron_debugger",
    "crates/klyron_cli",
    "crates/klyron_compat",
    "crates/klyron_config",
    "crates/klyron_crypto",
    "crates/klyron_deploy",
    "crates/klyron_dns",
    "crates/klyron_docker",
    "crates/klyron_engine",
    "crates/klyron_formatter",
    "crates/klyron_fs",
    "crates/klyron_http",
    "crates/klyron_linter",
    "crates/klyron_loader",
    "crates/klyron_logger",
    "crates/klyron_mysql",
