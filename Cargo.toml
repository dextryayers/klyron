[workspace]
resolver = "2"
members = [
    "src/cli",
    "src/core",
    "src/ext/console",
    "src/ext/timers",
    "src/ext/web",
    "src/ext/crypto",
    "src/ext/fs",
    "src/ext/net",
    "src/ext/http",
    "src/ext/node",
    "src/ext/klyron",
    "src/ext/ffi",
    "src/ext/ws",
    "src/ext/html",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
authors = ["Klyron Contributors"]

[workspace.dependencies]
deno_error = "0.7"
wasmtime = "28"
wasmtime-wasi = "28"
