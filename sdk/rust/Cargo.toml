[package]
name = "klyron-sdk"
version = "0.1.0"
edition = "2021"
description = "Rust SDK for the Klyron runtime - build plugins and extensions"
license = "MIT"
repository = "https://github.com/dextryayers/klyron"
keywords = ["klyron", "plugin", "runtime", "sdk"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"

[features]
plugin = []
runtime = []
default = ["plugin"]
